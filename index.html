<script>
        // 1. PERFORMANCE BOOSTER: Added 'preferCanvas: true'
        var map = L.map('map', { preferCanvas: true }).setView([39.8283, -98.5795], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var myRoutes = [
            'TA_01_EB_Main_2022.gpx',
            'TA_02_EB_Main_2018.gpx',
            'TA_03_EB_Main_2022.gpx',
            'TA_04_EB_Main_2020.gpx',
            'TA_05_EB_Main_2018.gpx',
            'TA_06_EB_Main_2018.gpx',
            'TA_07_EB_Main_2019.gpx',
            'TA_08_EB_Main_2019.gpx',
            'TA_09_EB_Main_2020.gpx',
            'R66_01_EB_Main_2020.gpx',
	    'Great_Lake-to-Lake_Trails_Route__1.gpx',
            'Hudson_Valley_EST.gpx',
            'Erie_Canal_EST_Buffalo-Albany.gpx'
        ];

        myRoutes.forEach(function(routeFile) {
            new L.GPX(routeFile, {
                async: true,
                marker_options: {
                    startIconUrl: '', 
                    endIconUrl: '',
                    shadowUrl: ''
                },
                polyline_options: {
                    color: '#3388ff', 
                    weight: 4,      // Slightly thinner line to look cleaner when zoomed out
                    opacity: 0.8
                }
            }).addTo(map); 
            // Notice I removed the auto-zooming 'fitBounds' code from here!
        });
    </script>
