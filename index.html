---
layout: default
---

<style>
    .post-card {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 20px;
        background: #fff;
        border: 1px solid #e0e0e0;
        padding: 20px;
        margin-bottom: 30px;
        border-left: 8px solid #FF6319; /* MTA Orange Accent */
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        position: relative;
    }
    
    /* The Thumbnail Image */
    .post-thumbnail {
        width: 150px;
        height: 150px;
        flex-shrink: 0;
        overflow: hidden;
        background-color: #f4f4f4;
    }
    .post-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* This perfectly crops your photo into a square! */
    }

    /* The Text Content */
    .post-content {
        flex: 1;
    }
    .post-meta {
        font-weight: bold;
        color: #0039A6; /* MTA Blue */
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }
    .post-content h2 {
        font-size: 1.5rem;
        margin: 0 0 10px 0;
        letter-spacing: -0.5px;
    }
    .post-content p {
        font-size: 1rem;
        line-height: 1.5;
        color: #555;
        margin-bottom: 15px;
    }
    .read-more {
        display: inline-block;
        background-color: #121212;
        color: white;
        text-decoration: none;
        padding: 6px 12px;
        font-size: 0.85rem;
        font-weight: bold;
        text-transform: uppercase;
    }
    .read-more:hover { background-color: #FF6319; }

    /* Mobile responsiveness: Stack them on small screens */
    @media (max-width: 600px) {
        .post-card { flex-direction: column; }
        .post-thumbnail { width: 100%; height: 200px; }
    }
</style>

<div id="map" style="width: 100%; height: 400px; border-bottom: 1px solid #ccc; background-color: #e5e5e5;"></div>

<main class="journal-feed" style="padding: 40px 20px;">
    
    {% for post in site.posts %}
    <article class="post-card">
        
        {% if post.image %}
        <div class="post-thumbnail">
            <img src="{{ post.image }}" alt="Thumbnail for {{ post.title }}">
        </div>
        {% endif %}

        <div class="post-content">
            <div class="post-meta">{{ post.date | date: "%b %d" }} &nbsp;&bull;&nbsp; {{ post.location }}</div>
            <h2>{{ post.title }}</h2>
            
            <p>{{ post.content | strip_html | truncatewords: 30 }}</p>
            
            <a href="{{ post.url }}" class="read-more">Read Entry &rarr;</a>
        </div>

    </article>
    {% endfor %}

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
