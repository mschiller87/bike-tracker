---
layout: default
---

<style>
    /* Abstract Subway Dashboard CSS */
    .dashboard-wrapper {
        background-color: #fff;
        padding: 60px 20px;
        border-bottom: 2px solid #e0e0e0;
        text-align: center;
    }
    .abstract-map {
        position: relative;
        max-width: 700px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    /* The main horizontal track */
    .abstract-map::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 8px;
        background-color: #0039A6; /* MTA Blue */
        transform: translateY(-50%);
        z-index: 1;
    }
    /* The progress fill line (We will automate this later, for now it's static) */
    .abstract-map::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        width: 15%; /* This represents how far you've gone! */
        height: 8px;
        background-color: #FF6319; /* MTA Orange */
        transform: translateY(-50%);
        z-index: 2;
    }
    .station {
        position: relative;
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .station-dot {
        width: 20px;
        height: 20px;
        background-color: #fff;
        border: 6px solid #121212;
        border-radius: 50%;
        margin-bottom: 10px;
    }
    .station.current .station-dot {
        border-color: #FF6319; /* Highlights your current location */
        box-shadow: 0 0 0 4px rgba(255, 99, 25, 0.2);
    }
    .station-label {
        font-size: 0.85rem;
        font-weight: bold;
        text-transform: uppercase;
        color: #121212;
        background: #fff;
        padding: 2px 5px;
    }
    
    /* ... [Your existing Timeline CSS from the previous step goes here] ... */
    .timeline-feed { max-width: 800px; margin: 0 auto; padding: 40px 20px 40px 40px; }
    .timeline-stop { border-left: 6px solid #121212; padding-left: 35px; padding-bottom: 50px; position: relative; }
    .timeline-stop:last-child { border-left-color: transparent; }
    .timeline-stop::before { content: ''; position: absolute; left: -15px; top: 20px; width: 12px; height: 12px; background: #ffffff; border: 6px solid #0039A6; border-radius: 50%; z-index: 2; }
    .post-card { display: flex; flex-direction: row; align-items: flex-start; gap: 20px; background: #fff; border: 1px solid #e0e0e0; padding: 20px; border-left: 6px solid #FF6319; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .post-thumbnail { width: 150px; height: 150px; flex-shrink: 0; overflow: hidden; background-color: #f4f4f4; }
    .post-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .post-content { flex: 1; }
    .post-meta { font-weight: bold; color: #555; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 8px; }
    .post-content h2 { font-size: 1.5rem; margin: 0 0 10px 0; letter-spacing: -0.5px; }
    .post-content p { font-size: 1rem; line-height: 1.5; color: #555; margin-bottom: 15px; }
    .read-more { display: inline-block; background-color: #121212; color: white; text-decoration: none; padding: 6px 12px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
    .read-more:hover { background-color: #FF6319; }
    @media (max-width: 600px) { .timeline-feed { padding-left: 20px; } .timeline-stop { padding-left: 25px; border-left-width: 4px; } .timeline-stop::before { left: -11px; width: 10px; height: 10px; border-width: 4px; } .post-card { flex-direction: column; } .post-thumbnail { width: 100%; height: 200px; } }
</style>

<div class="dashboard-wrapper">
    <h2 style="font-size: 1.2rem; margin-top: 0; margin-bottom: 40px; text-transform: uppercase; color: #555; letter-spacing: 1px;">Overall Progress</h2>
    <div class="abstract-map">
        <div class="station start">
            <div class="station-dot"></div>
            <span class="station-label">Astoria, OR</span>
        </div>
        <div class="station current">
            <div class="station-dot"></div>
            <span class="station-label">Tillamook</span>
        </div>
        <div class="station end">
            <div class="station-dot"></div>
            <span class="station-label">New York, NY</span>
        </div>
    </div>
</div>

<main class="timeline-feed">
    {% for post in site.posts %}
    <div class="timeline-stop">
        <article class="post-card">
            {% if post.image %}
            <div class="post-thumbnail">
                <img src="{{ post.image }}" alt="Thumbnail for {{ post.title }}">
            </div>
            {% endif %}
            <div class="post-content">
                <div class="post-meta">{{ post.date | date: "%b %d" }} &nbsp;&bull;&nbsp; {{ post.location }}</div>
                <h2>{{ post.title }}</h2>
                <p>{{ post.content | strip_html | truncatewords: 30 }}</p>
                <a href="{{ post.url }}" class="read-more">Read Entry &rarr;</a>
            </div>
        </article>
    </div>
    {% endfor %}
</main>
