<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cross-Country Bike Ride</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; text-align: center; }
        h1 { background-color: #2c3e50; color: white; margin: 0; padding: 15px; }
        #map { width: 100%; height: 80vh; }
    </style>
</head>
<body>

    <h1>Oregon to NYC: Live Tracking Map</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    
    <script>
        // Initialize the map 
        var map = L.map('map').setView([39.8283, -98.5795], 5); // Centered on the US

        // Add the map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 1. Your complete list of GPX files for the first ~3,200 miles!
        var myRoutes = [
            'TA_01_EB_Main_2022.gpx',
            'TA_02_EB_Main_2018.gpx',
            'TA_03_EB_Main_2022.gpx',
            'TA_04_EB_Main_2020.gpx',
            'TA_05_EB_Main_2018.gpx',
            'TA_06_EB_Main_2018.gpx',
            'TA_07_EB_Main_2019.gpx',
            'TA_08_EB_Main_2019.gpx',
            'TA_09_EB_Main_2020.gpx',
            'R66_01_EB_Main_2020.gpx',
            'Great_Lake-to-Lake_Trails_Route__1.gpx',
            'Hudson_Valley_EST.gpx',
            'Erie_Canal_EST_Buffalo-Albany.gpx'
        ];

        // 2. Loop through the list and draw each one on the map
        myRoutes.forEach(function(routeFile) {
            new L.GPX(routeFile, {
                async: true,
                marker_options: {
                    startIconUrl: '', // Hides default pins to keep the map clean
                    endIconUrl: '',
                    shadowUrl: ''
                },
                polyline_options: {
                    color: '#3388ff', // The color of your planned route
                    weight: 5,        // Thickness of the line
                    opacity: 0.8
                }
            }).on('loaded', function(e) {
                // This makes the map automatically zoom out to fit all the routes as they load
                map.fitBounds(e.target.getBounds());
            }).addTo(map);
        });
    </script>

</body>
</html>
