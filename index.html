---
layout: default
---

<div id="map" style="width: 100%; height: 450px; border-bottom: 1px solid #ccc; background-color: #e5e5e5;"></div>

<main class="journal-feed">
    {% for post in site.posts %}
    <article class="post">
        <div class="post-meta">{{ post.date | date: "%B %d, %Y" }} &nbsp;&bull;&nbsp; {{ post.location }}</div>
        <h2>{{ post.title }}</h2>
        {{ post.content }}
    </article>
    {% endfor %}
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
    var map = L.map('map', { preferCanvas: true }).setView([39.8283, -98.5795], 4);

    // CHANGED: Using CartoDB Positron for a sleek, greyscale minimalist map!
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    var myRoutes = [
        'TA_01_EB_Main_2022.gpx', 'TA_02_EB_Main_2018.gpx', 'TA_03_EB_Main_2022.gpx',
        'TA_04_EB_Main_2020.gpx', 'TA_05_EB_Main_2018.gpx', 'TA_06_EB_Main_2018.gpx',
        'TA_07_EB_Main_2019.gpx', 'TA_08_EB_Main_2019.gpx', 'TA_09_EB_Main_2020.gpx',
        'R66_01_EB_Main_2020.gpx', 'Great_Lake-to-Lake_Trails_Route__1.gpx',
        'Hudson_Valley_EST.gpx', 'Erie_Canal_EST_Buffalo-Albany.gpx'
    ];

    myRoutes.forEach(function(routeFile) {
        new L.GPX(routeFile, {
            async: true,
            marker_options: { startIconUrl: '', endIconUrl: '', shadowUrl: '' },
            polyline_options: {
                color: '#0039A6', // MTA Blue for the Planned Route
                weight: 5,      
                opacity: 0.8
            }
        }).addTo(map); 
    });

    // Fetch Automated Strava Data
    fetch('strava_rides.geojson')
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                style: function (feature) {
                    return {
                        color: '#FF6319', // MTA Orange for Actual Ridden Progress!
                        weight: 5,
                        opacity: 1.0
                    };
                },
                onEachFeature: function (feature, layer) {
                    var distMiles = (feature.properties.distance * 0.000621371).toFixed(1);
                    layer.bindPopup("<b>" + feature.properties.name + "</b><br>" + distMiles + " miles");
                }
            }).addTo(map);
        })
        .catch(err => console.log("No Strava data found yet."));
</script>
