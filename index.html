<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cross-Country Bike Ride</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; text-align: center; }
        h1 { background-color: #2c3e50; color: white; margin: 0; padding: 15px; }
        #map { width: 100%; height: 80vh; }
    </style>
</head>
<body>

    <h1>Oregon to NYC: Live Tracking Map</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    
    <script>
        // 3. Initialize the map with the Canvas performance boost
        var map = L.map('map', { preferCanvas: true }).setView([39.8283, -98.5795], 5);

        // 4. Add the base map images
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 5. Your list of GPX files
        var myRoutes = [
            'TA_01_EB_Main_2022.gpx',
            'TA_02_EB_Main_2018.gpx',
            'TA_03_EB_Main_2022.gpx',
            'TA_04_EB_Main_2020.gpx',
            'TA_05_EB_Main_2018.gpx',
            'TA_06_EB_Main_2018.gpx',
            'TA_07_EB_Main_2019.gpx',
            'TA_08_EB_Main_2019.gpx',
            'TA_09_EB_Main_2020.gpx',
            'R66_01_EB_Main_2020.gpx'
        ];

        // 6. Draw each route without the auto-zooming glitch
        myRoutes.forEach(function(routeFile) {
            new L.GPX(routeFile, {
                async: true,
                marker_options: {
                    startIconUrl: '', 
                    endIconUrl: '',
                    shadowUrl: ''
                },
                polyline_options: {
                    color: '#3388ff', 
                    weight: 4,      
                    opacity: 0.8
                }
            }).addTo(map); 
        });
    </script>

</body>
</html>
