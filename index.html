<style>
    /* Sleek Abstract Strip Map CSS */
    .strip-map-container {
        max-width: 800px;
        margin: 0 auto; 
        padding: 180px 20px 80px 20px; 
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        /* THE MAGIC FIX: Chops off any text trying to bleed off the right edge */
        overflow: hidden; 
        /* Ensures padding doesn't add to the total width */
        box-sizing: border-box; 
    }

    .track-line {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 6px solid #121212; 
        padding-bottom: 0;
        position: relative;
    }

    .station-node {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 25%; /* 4 nodes * 25% = exactly 100% width! */
    }

    /* The Station Circles */
    .station-dot {
        position: absolute;
        bottom: -11px; 
        width: 16px;
        height: 16px;
        background-color: #fff;
        border: 5px solid #121212; 
        border-radius: 50%;
        z-index: 2;
    }

    .station-node.current .station-dot {
        border-color: #FF6319; 
        box-shadow: 0 0 0 4px rgba(255, 99, 25, 0.15);
    }

    .station-node.final .station-dot {
        border-color: #EE352E; 
    }

    /* The Sleek Angled Text */
    .angled-label {
        position: absolute;
        bottom: 25px; 
        left: 50%;
        transform-origin: bottom left;
        transform: rotate(-45deg);
        font-size: 1.1rem;
        font-weight: bold;
        color: #121212;
        white-space: normal; 
        width: 150px; 
        line-height: 1.2; 
        letter-spacing: -0.5px;
    }

    .sub-label {
        display: block; 
        font-size: 0.8rem;
        color: #888;
        font-weight: normal;
        margin-top: 2px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .mileage-stats {
        position: absolute;
        top: 25px; 
        font-size: 0.85rem;
        font-weight: bold;
        color: #555;
        text-align: center;
        width: 100%;
        text-transform: uppercase;
    }

    /* Clean Card CSS */
    .journal-feed { 
        max-width: 800px; 
        margin: 0 auto; 
        padding: 0 40px 60px 40px; 
        box-sizing: border-box; /* Prevents padding from breaking page width */
        overflow-x: hidden; /* Double protection against horizontal scrolling */
    }
    
    .post-card { 
        display: flex; 
        flex-direction: row; 
        align-items: flex-start; 
        gap: 20px; 
        background: #fff; 
        border: 1px solid #e0e0e0; 
        padding: 20px; 
        margin-bottom: 30px;
        border-left: 6px solid #FF6319; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        box-sizing: border-box;
    }
    .post-thumbnail { width: 150px; height: 150px; flex-shrink: 0; overflow: hidden; background-color: #f4f4f4; }
    .post-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .post-content { flex: 1; }
