    /* 1. Sleek Abstract Strip Map CSS */
    .strip-map-container {
        max-width: 800px; margin: 0 auto; padding: 180px 20px 80px 20px; 
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    .track-line { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 6px solid #121212; padding-bottom: 0; position: relative; }
    .station-node { position: relative; display: flex; flex-direction: column; align-items: center; width: 25%; }

    .station-node.current .station-dot { border-color: #FF6319; box-shadow: 0 0 0 4px rgba(255, 99, 25, 0.15); }
    .station-node.final .station-dot { border-color: #EE352E; }
    .angled-label { position: absolute; bottom: 25px; left: 50%; transform-origin: bottom left; transform: rotate(-45deg); font-size: 1.1rem; font-weight: bold; color: #121212; white-space: normal; width: 150px; line-height: 1.2; letter-spacing: -0.5px; }

    .mileage-stats { position: absolute; top: 25px; font-size: 0.85rem; font-weight: bold; color: #555; text-align: center; width: 100%; text-transform: uppercase; }
