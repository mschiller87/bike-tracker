<script>
        // Initialize the map
        var map = L.map('map').setView([44.5, -120.0], 6);

        // Add the map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 1. Create a list of all your GPX files
        var myRoutes = [
            'TA_01_EB_Main_2022.gpx',
            'TA_02_EB_Main_2018.gpx',
            'TA_03_EB_Main_2022.gpx' 
            // You can keep adding as many files here as you want! Just make sure 
            // they are wrapped in quotes and separated by a comma.
        ];

        // 2. Loop through the list and draw each one on the map
        myRoutes.forEach(function(routeFile) {
            new L.GPX(routeFile, {
                async: true,
                marker_options: {
                    startIconUrl: '', // Hides default pins to keep the map clean
                    endIconUrl: '',
                    shadowUrl: ''
                },
                polyline_options: {
                    color: '#3388ff', // The color of your planned route
                    weight: 5,        // Thickness of the line
                    opacity: 0.8
                }
            }).on('loaded', function(e) {
                // This makes the map automatically zoom out to fit all the routes as they load
                map.fitBounds(e.target.getBounds());
            }).addTo(map);
        });
    </script>
