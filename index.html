<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cross-Country Bike Ride</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; text-align: center; }
        h1 { background-color: #2c3e50; color: white; margin: 0; padding: 15px; }
        #map { width: 100%; height: 80vh; }
    </style>
</head>
<body>

    <h1>Oregon to NYC: Live Tracking Map</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    
    <script>
        // Initialize the map (Zoomed in a bit closer to Oregon)
        var map = L.map('map').setView([44.5, -120.0], 6);

        // Add the map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Load the GPX file you just uploaded!
        var gpxFile = 'TA_01_EB_Main_2022.gpx';

        new L.GPX(gpxFile, {
            async: true,
            marker_options: {
                // We hide the default start/end pins so the map stays clean
                startIconUrl: '',
                endIconUrl: '',
                shadowUrl: ''
            },
            polyline_options: {
                color: '#3388ff', // A nice bright blue
                weight: 5,        // Thickness of the line
                opacity: 0.8
            }
        }).on('loaded', function(e) {
            // Automatically zoom the map to fit the route perfectly once it loads!
            map.fitBounds(e.target.getBounds());
        }).addTo(map);
    </script>

</body>
</html>
