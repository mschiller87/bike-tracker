<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cross-Country Bike Ride</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            background-color: #2c3e50;
            color: white;
            margin: 0;
            padding: 15px;
        }
        /* This tells the map to take up a good chunk of the screen */
        #map {
            width: 100%;
            height: 80vh; 
        }
    </style>
</head>
<body>

    <h1>Oregon to NYC: Live Tracking Map</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize the map and set the starting view to the center of the US
        // The numbers are [Latitude, Longitude], and the '4' is the zoom level
        var map = L.map('map').setView([39.8283, -98.5795], 4);

        // Add the free OpenStreetMap tiles (the actual map images)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
    </script>

</body>
</html>
