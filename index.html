<style>
    /* The Timeline Wrapper */
    .timeline-feed {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px 40px 40px; /* Extra left padding for the line */
    }

    /* The Continuous Line */
    .timeline-stop {
        border-left: 6px solid #121212; /* The thick subway track */
        padding-left: 35px; /* Pushes the card to the right */
        padding-bottom: 50px; /* Space between posts */
        position: relative;
    }
    
    /* Hide the line on the very last item so it doesn't trail off into nowhere */
    .timeline-stop:last-child {
        border-left-color: transparent;
    }

    /* The Subway Circle */
    .timeline-stop::before {
        content: '';
        position: absolute;
        left: -15px; /* Centers the circle perfectly over the 6px line */
        top: 20px; /* Aligns the circle near the top of the card */
        width: 12px;
        height: 12px;
        background: #ffffff;
        border: 6px solid #0039A6; /* MTA Blue for the station stop! */
        border-radius: 50%;
        z-index: 2;
    }

    /* The Scannable Card */
    .post-card {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 20px;
        background: #fff;
        border: 1px solid #e0e0e0;
        padding: 20px;
        border-left: 6px solid #FF6319; /* MTA Orange accent on the card itself */
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        position: relative;
    }
    
    /* The Thumbnail Image */
    .post-thumbnail {
        width: 150px;
        height: 150px;
        flex-shrink: 0;
        overflow: hidden;
        background-color: #f4f4f4;
    }
    .post-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Perfectly crops photo into a square */
    }

    /* The Text Content */
    .post-content {
        flex: 1;
    }
    .post-meta {
        font-weight: bold;
        color: #555;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }
    .post-content h2 {
        font-size: 1.5rem;
        margin: 0 0 10px 0;
        letter-spacing: -0.5px;
    }
    .post-content p {
        font-size: 1rem;
        line-height: 1.5;
        color: #555;
        margin-bottom: 15px;
    }
    .read-more {
        display: inline-block;
        background-color: #121212;
        color: white;
        text-decoration: none;
        padding: 6px 12px;
        font-size: 0.85rem;
        font-weight: bold;
        text-transform: uppercase;
    }
    .read-more:hover { background-color: #FF6319; }

    /* Mobile responsiveness */
    @media (max-width: 600px) {
        .timeline-feed { padding-left: 20px; }
        .timeline-stop { padding-left: 25px; border-left-width: 4px; }
        .timeline-stop::before { left: -11px; width: 10px; height: 10px; border-width: 4px; }
        .post-card { flex-direction: column; }
        .post-thumbnail { width: 100%; height: 200px; }
    }
</style>

<main class="timeline-feed">
    
    {% for post in site.posts %}
    <div class="timeline-stop">
        <article class="post-card">
            
            {% if post.image %}
            <div class="post-thumbnail">
                <img src="{{ post.image }}" alt="Thumbnail for {{ post.title }}">
            </div>
            {% endif %}

            <div class="post-content">
                <div class="post-meta">{{ post.date | date: "%b %d" }} &nbsp;&bull;&nbsp; {{ post.location }}</div>
                <h2>{{ post.title }}</h2>
                <p>{{ post.content | strip_html | truncatewords: 30 }}</p>
                <a href="{{ post.url }}" class="read-more">Read Entry &rarr;</a>
            </div>

        </article>
    </div>
    {% endfor %}

</main>
