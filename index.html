<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        // 1. Find all expand buttons and attach a safe event listener
        const expandButtons = document.querySelectorAll('.expand-toggle');
        
        expandButtons.forEach(btn => {
            // Remove any inline onclick attributes just in case
            btn.removeAttribute('onclick');
            
            btn.addEventListener('click', function() {
                const card = this.closest('.post-card');
                const preview = card.querySelector('.post-preview');
                const full = card.querySelector('.post-full');
                const thumbnail = card.querySelector('.post-thumbnail');
                
                // ACTION: Expand the card
                if (!card.classList.contains('expanded')) {
                    full.style.display = 'block';
                    preview.style.display = 'none';
                    if (thumbnail) thumbnail.style.display = 'none'; 
                    this.innerHTML = 'Close Entry';
                    card.classList.add('expanded'); 

                    // Automagically create the gallery safely
                    if (!card.dataset.galleryProcessed) {
                        const galleryContainer = document.createElement('div');
                        galleryContainer.className = 'post-image-grid';
                        
                        // Safely check for a primary thumbnail image
                        if (thumbnail) {
                            const primaryImg = thumbnail.querySelector('img');
                            if (primaryImg) {
                                galleryContainer.innerHTML += `<img src="${primaryImg.src}" class="lightbox-trigger">`;
                            }
                        }
                        
                        // Safely grab embedded markdown images
                        const extraImages = full.querySelectorAll('img:not(.lightbox-trigger)');
                        extraImages.forEach(img => {
                            const newImg = document.createElement('img');
                            newImg.src = img.src;
                            newImg.className = 'lightbox-trigger';
                            galleryContainer.appendChild(newImg);
                            img.remove(); // Removes raw image from text
                        });
                        
                        // Safely remove the "Today's Gallery" text if it exists
                        const headers = full.querySelectorAll('h3');
                        headers.forEach(h => { if(h.innerText.includes('Gallery')) h.remove(); });
                        
                        full.appendChild(galleryContainer);
                        card.dataset.galleryProcessed = "true";
                        
                        // Re-bind Lightbox events for the new images
                        setupLightboxEvents();
                    }
                } 
                // ACTION: Collapse the card
                else {
                    full.style.display = 'none';
                    preview.style.display = 'block';
                    if (thumbnail) thumbnail.style.display = 'block';
                    this.innerHTML = 'Full Entry';
                    card.classList.remove('expanded');
                }
            });
        });

        // 2. Lightbox Functionality
        let currentGallery = [];
        let currentIndex = 0;

        function setupLightboxEvents() {
            const triggers = document.querySelectorAll('.lightbox-trigger');
            triggers.forEach((trigger, index) => {
                // Ensure we don't attach multiple click events to the same image
                trigger.onclick = null; 
                trigger.onclick = function() {
                    // Find ONLY the images inside the specific card that was clicked
                    const parentCard = this.closest('.post-card');
                    const cardImages = parentCard.querySelectorAll('.lightbox-trigger');
                    
                    currentGallery = Array.from(cardImages).map(img => img.src);
                    
                    // Find which index we just clicked
                    currentIndex = currentGallery.indexOf(this.src);
                    openLightbox();
                };
            });
        }

        function openLightbox() {
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden'; 
            updateLightboxImage();
        }

        window.closeLightbox = function() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.changeLightbox = function(dir) {
            currentIndex += dir;
            if (currentIndex >= currentGallery.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = currentGallery.length - 1;
            updateLightboxImage();
        }

        function updateLightboxImage() {
            const imgEl = document.getElementById('lightbox-img');
            if (imgEl && currentGallery.length > 0) {
                imgEl.src = currentGallery[currentIndex];
            }
        }
    });
</script>
