<style>
    .stats-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* THE STAT CARDS GRID */
    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
    }

    .stat-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-top: 6px solid #121212;
        padding: 30px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        opacity: 0; 
        transform: translateY(40px);
        /* SLOWED DOWN: The card itself takes 1 full second to gracefully float up and fade in */
        transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .stat-card.in-view {
        opacity: 1;
        transform: translateY(0);
    }

    .stat-title {
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #888;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .stat-number {
        font-size: 4rem;
        font-weight: bold;
        color: #121212;
        line-height: 1;
        margin-bottom: 20px;
        letter-spacing: -2px;
    }

    /* --- SLOWED SPECIFIC ANIMATIONS --- */

    /* Elevation Mountain Animation */
    .mountain-graphic {
        width: 100px;
        height: 50px;
        margin: 0 auto;
    }
    .mountain-path {
        fill: none;
        stroke: #6CBE45; 
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
    }
    .stat-card.in-view .mountain-path {
        /* Slowed from 2s to 3s */
        animation: climbMountain 3s ease-out forwards;
        animation-delay: 0.5s;
    }
    @keyframes climbMountain {
        to { stroke-dashoffset: 0; }
    }

    .hotdog-container {
        font-size: 2rem;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 5px;
        min-height: 40px;
    }
    .hotdog-emoji {
        opacity: 0;
        transform: translateY(-20px);
    }

        /* Slowed from 0.5s to 0.8s for a lazier drop */
