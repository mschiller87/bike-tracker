---
layout: default
---

<style>
    .stats-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
    }

    .stat-card {
        background-color: #fff;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        border-top: 4px solid #121212;
        transition: transform 0.2s;
    }

    .stat-card:hover {
        transform: translateY(-5px);
    }

    .stat-icon {
        font-size: 2.5rem;
        margin-bottom: 10px;
        user-select: none;
    }

    .stat-value-container {
        font-size: 3rem;
        font-weight: 900;
        color: #121212;
        line-height: 1;
        margin-bottom: 10px;
        letter-spacing: -2px;
        display: flex;
        align-items: baseline;
        justify-content: center;
    }

    .stat-label {
        font-size: 0.85rem;
        font-weight: bold;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Distinct Colors for Card Tops */
    .card-miles { border-top-color: #121212; } 
    .card-food { border-top-color: #FCCC0A; } 
    .card-sleep { border-top-color: #6CBE45; } 

    @media (max-width: 600px) {
        .stats-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-value-container { font-size: 2.2rem; }
        .stat-icon { font-size: 2rem; }
    }
</style>

<div class="stats-container">
    <div class="stats-grid">
        
        <div class="stat-card card-miles">
            <div class="stat-icon">🚲</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.posts.first.total_miles | default: 0 | round }}">0</span>
            </div>
            <div class="stat-label">Miles Ridden</div>
        </div>

        <div class="stat-card card-miles">
            <div class="stat-icon">⛰️</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.data.automated_stats.total_elevation_ft | default: 0 }}">0</span>
            </div>
            <div class="stat-label">Feet Climbed</div>
        </div>

        <div class="stat-card card-miles">
            <div class="stat-icon">⏱️</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.data.automated_stats.total_moving_hours | default: 0 }}">0</span>
            </div>
            <div class="stat-label">Hours Biking</div>
        </div>

        <div class="stat-card card-food">
            <div class="stat-icon">🍩</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.data.automated_stats.total_calories | divided_by: 300 | default: 0 }}">0</span>
            </div>
            <div class="stat-label">Donuts Burned</div>
        </div>

        <div class="stat-card card-food">
            <div class="stat-icon">🌭</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.data.fun_stats.hot_dogs | default: 0 }}">0</span>
            </div>
            <div class="stat-label">Hot Dogs Eaten</div>
        </div>

        <div class="stat-card card-sleep">
            <div class="stat-icon">⛺</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.data.fun_stats.nights_tent | default: 0 }}">0</span>
            </div>
            <div class="stat-label">Nights in Tent</div>
        </div>

        <div class="stat-card card-sleep">
            <div class="stat-icon">🛏️</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.data.fun_stats.nights_bed | default: 0 }}">0</span>
            </div>
            <div class="stat-label">Nights in Bed</div>
        </div>

        <div class="stat-card card-sleep">
            <div class="stat-icon">☀️</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.data.fun_stats.hottest_day | default: 0 }}">0</span><span style="font-size: 1.5rem; margin-left: 5px;">°F</span>
            </div>
            <div class="stat-label">Hottest Ride</div>
        </div>

        <div class="stat-card card-sleep">
            <div class="stat-icon">❄️</div>
            <div class="stat-value-container">
                <span class="counter" data-target="{{ site.data.fun_stats.coldest_night | default: 0 }}">0</span><span style="font-size: 1.5rem; margin-left: 5px;">°F</span>
            </div>
            <div class="stat-label">Coldest Night</div>
        </div>

    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const counters = document.querySelectorAll('.counter');
        
        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const counter = entry.target;
                    const target = +counter.getAttribute('data-target');
                    
                    if (target <= 0) {
                        counter.innerText = target;
                        observer.unobserve(counter);
                        return;
                    }

                    const duration = 1500; 
                    const frameRate = 1000 / 60; 
                    const totalFrames = Math.round(duration / frameRate);
                    const increment = target / totalFrames;
                    
                    let currentCount = 0;
                    
                    const updateCounter = setInterval(() => {
                        currentCount += increment;
                        if (currentCount >= target) {
                            counter.innerText = target.toLocaleString(); 
                            clearInterval(updateCounter);
                        } else {
                            counter.innerText = Math.ceil(currentCount).toLocaleString();
                        }
                    }, frameRate);
                    
                    observer.unobserve(counter);
                }
            });
        }, { threshold: 0.2 });

        counters.forEach(counter => observer.observe(counter));
    });
</script>
