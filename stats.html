---
layout: default
title: Stats
---

<style>
    .stats-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
    }

    .stat-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-top: 6px solid #121212;
        padding: 30px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        opacity: 0; 
        transform: translateY(40px);
        transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .stat-card.in-view {
        opacity: 1;
        transform: translateY(0);
    }

    .stat-title {
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #888;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .stat-number {
        font-size: 3.5rem;
        font-weight: bold;
        color: #121212;
        line-height: 1;
        margin-bottom: 15px;
        letter-spacing: -2px;
    }
    
    .stat-subtext {
        font-size: 0.8rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
    }

    /* --- CUSTOM ANIMATIONS --- */
    .spin-gear { font-size: 2.5rem; display: inline-block; }
    .stat-card.in-view .spin-gear { animation: spin 3s ease-out forwards; animation-delay: 0.5s; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .pop-up-emoji { font-size: 2.5rem; display: inline-block; opacity: 0; transform: scale(0); }
    .stat-card.in-view .pop-up-emoji { animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: 1s; }
    @keyframes popUp { to { opacity: 1; transform: scale(1); } }

    .fire-emoji { font-size: 2.5rem; display: inline-block; transform-origin: bottom; }
    .stat-card.in-view .fire-emoji { animation: flicker 2s infinite alternate; }
    @keyframes flicker { 0% { transform: scale(1) rotate(-5deg); } 100% { transform: scale(1.1) rotate(5deg); } }

    .mountain-graphic { width: 100px; height: 50px; margin: 0 auto; }
    .mountain-path { fill: none; stroke: #6CBE45; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 200; stroke-dashoffset: 200; }
    .stat-card.in-view .mountain-path { animation: climbMountain 3s ease-out forwards; animation-delay: 0.5s; }
    @keyframes climbMountain { to { stroke-dashoffset: 0; } }

    .hotdog-container { font-size: 2rem; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; min-height: 40px; }
    .hotdog-emoji { opacity: 0; transform: translateY(-20px); }
    .stat-card.in-view .hotdog-emoji { animation: dropIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes dropIn { to { opacity: 1; transform: translateY(0); } }
</style>

<div class="stats-container">
    <div class="stat-grid">
        
        <div class="stat-card" style="border-top-color: #0039A6;">
            <div class="stat-title">Total Miles Biked</div>
            <div class="stat-number" data-target="{{ site.posts.first.total_miles | default: 0 }}">0</div>
            <div style="font-size: 2.5rem;">🚲</div>
        </div>

        <div class="stat-card" style="border-top-color: #EE352E;">
            <div class="stat-title">Time Spent Pedaling</div>
            <div class="stat-number" data-target="{{ site.data.automated_stats.total_moving_hours | default: 0 }}">0</div>
            <div class="stat-subtext">Hours</div>
            <div class="spin-gear">⚙️</div>
        </div>

        <div class="stat-card" style="border-top-color: #6CBE45;">
            <div class="stat-title">Elevation Climbed</div>
            <div class="stat-number" data-target="{{ site.data.automated_stats.total_elevation_ft | default: 0 }}">0</div>
            <div class="stat-subtext">Feet</div>
            <svg class="mountain-graphic" viewBox="0 0 100 50">
                <path class="mountain-path" d="M5,45 L30,15 L50,35 L80,5 L95,45" />
            </svg>
        </div>

        <div class="stat-card" style="border-top-color: #FF6319;">
            <div class="stat-title">Longest Single Day</div>
            <div class="stat-number" data-target="{{ site.data.automated_stats.longest_day_miles | default: 0 }}">0</div>
            <div class="stat-subtext">Miles</div>
            <div class="fire-emoji">🔥</div>
        </div>

        <div class="stat-card" style="border-top-color: #FCCC0A;">
            <div class="stat-title">Donuts Burned</div>
            {% assign cals = site.data.automated_stats.total_calories | default: 0 %}
            <div class="stat-number" data-target="{{ cals | divided_by: 250 }}">0</div>
            <div class="pop-up-emoji" style="animation-delay: 1.5s;">🍩</div>
        </div>

        <div class="stat-card" style="border-top-color: #0039A6;">
            <div class="stat-title">Nights in a Tent</div>
            <div class="stat-number" data-target="{{ site.data.fun_stats.nights_tent | default: 0 }}">0</div>
            <div class="pop-up-emoji">⛺️</div>
        </div>

        <div class="stat-card" style="border-top-color: #6CBE45;">
            <div class="stat-title">Nights in a Bed</div>
            <div class="stat-number" data-target="{{ site.data.fun_stats.nights_bed | default: 0 }}">0</div>
            <div class="pop-up-emoji">🛏️</div>
        </div>

        <div class="stat-card" style="border-top-color: #EE352E;">
            <div class="stat-title">Hot Dogs Consumed</div>
            <div class="stat-number" data-target="{{ site.data.fun_stats.hot_dogs | default: 0 }}">0</div>
            <div class="hotdog-container" id="hotdog-box"></div>
        </div>

    </div>
</div>
