<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Transcontinental</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* NYC Subway Tile Background */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa;
            background-image:
              linear-gradient(to right, #e9ecef 1px, transparent 1px),
              linear-gradient(to bottom, #e9ecef 1px, transparent 1px);
            background-size: 60px 30px; 
            color: #121212;
        }

        /* Bold MTA-Style Sticky Header */
        header {
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background-color: #121212;
            color: white;
            text-align: center;
        }
        
        .header-text {
            padding: 25px 20px 20px 20px;
        }

        header h1 { 
            font-size: 3rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: -1.5px; 
            margin: 0; 
        }
        header p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-top: 10px;
            margin-bottom: 0;
        }

        /* --------------------------------------
           THE ANIMATED 5-COLOR ACCORDION TABS 
           -------------------------------------- */
        .mta-tabs {
            display: flex;
            width: 100%;
            height: 45px; /* Creates a thick, clickable ribbon */
        }
        
        .mta-tab {
            flex: 1; /* Inactive tabs shrink down to an equal, minimal width */
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden; /* Hides text that spills out when shrunk */
            cursor: pointer;
            /* The transition makes the expansion buttery smooth */
            transition: flex 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* The hidden text inside the tabs */
        .mta-tab span {
            opacity: 0;
            max-width: 0;
            white-space: nowrap;
            transition: all 0.4s ease;
        }

        /* What happens when you hover OR when the tab is currently active */
        .mta-tab:hover, 
        .mta-tab.active {
            flex: 4; /* Multiplies the width of the active/hovered block! */
        }

        /* Fade in and expand the text */
        .mta-tab:hover span, 
        .mta-tab.active span {
            opacity: 1;
            max-width: 150px; 
            margin: 0 10px;
        }

        /* Assigning the 5 exact MTA Route Colors */
        .tab-blue   { background-color: #0039A6; }
        .tab-orange { background-color: #FF6319; }
        .tab-green  { background-color: #6CBE45; }
        .tab-red    { background-color: #EE352E; }
        .tab-yellow { background-color: #FCCC0A; color: #121212; } /* Dark text for the yellow tab to ensure readability */

        /* The Content Wrapper */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white; 
            padding: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-text">
            <h1>The Transcontinental</h1>
            <p>Pacific to Atlantic &nbsp;&bull;&nbsp; Summer 2026</p>
        </div>
        
        <nav class="mta-tabs">
            <a href="{{ site.baseurl }}/" class="mta-tab tab-blue {% unless page.url contains 'tracker' %}active{% endunless %}">
                <span>Journal</span>
            </a>
            
            <a href="{{ site.baseurl }}/tracker.html" class="mta-tab tab-orange {% if page.url contains 'tracker' %}active{% endif %}">
                <span>Live Map</span>
            </a>
            
            <a href="#" class="mta-tab tab-green">
                <span>Route</span>
            </a>
            
            <a href="#" class="mta-tab tab-red">
                <span>Gear List</span>
            </a>
            
            <a href="#" class="mta-tab tab-yellow">
                <span>About</span>
            </a>
        </nav>
    </header>

    <div class="container">
        {{ content }}
    </div>

</body>
</html>
