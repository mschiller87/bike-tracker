<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Transcontinental</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* FIX 1: Removed 'height: 100%' so the entire page can organically grow */
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; }

        body { 
            display: flex; flex-direction: column; min-height: 100vh;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa;
            /* Now the background grid will scroll normally with the page */
            background-image:
              linear-gradient(to right, #e9ecef 1px, transparent 1px),
              linear-gradient(to bottom, #e9ecef 1px, transparent 1px);
            background-attachment: fixed; /* Keeps the grid looking crisp while scrolling */
            background-size: 60px 30px; 
            color: #121212;
        }

        header { position: sticky; top: 0; z-index: 1000; background-color: #121212; color: white; text-align: center; }
        .header-text { padding: 25px 20px 20px 20px; transition: padding 0.3s ease; }
        header h1 { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: bold; text-transform: uppercase; letter-spacing: -1.5px; margin: 0; white-space: nowrap; }
        header p { font-size: clamp(0.65rem, 2vw, 0.9rem); text-transform: uppercase; letter-spacing: 2px; color: #aaa; margin-top: 10px; margin-bottom: 0; white-space: nowrap; }

        .mta-tabs { display: flex; width: 100%; height: 40px; }
        
        .mta-tab {
            flex: 1; 
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: white; font-weight: bold; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 1px; overflow: hidden; 
            transition: flex 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tab-icon { width: 20px; height: 20px; flex-shrink: 0; filter: invert(1); }
        .tab-yellow { color: #121212; }
        .tab-yellow .tab-icon { filter: none; }

        .mta-tab span { opacity: 0; max-width: 0; white-space: nowrap; transition: all 0.4s ease; display: inline-block; }
        .mta-tab:hover, .mta-tab.active { flex: 3; }
        .mta-tab:hover span, .mta-tab.active span { opacity: 1; max-width: 150px; margin-left: 8px; }
