<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Transcontinental</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* NYC Subway Tile Background */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa;
            background-image:
              linear-gradient(to right, #e9ecef 1px, transparent 1px),
              linear-gradient(to bottom, #e9ecef 1px, transparent 1px);
            background-size: 60px 30px; 
            color: #121212;
        }

        /* Bold MTA-Style Sticky Header */
        header {
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background-color: #121212;
            color: white;
            padding: 25px 20px; 
            text-align: center;
            border-bottom: 6px solid;
            border-image: linear-gradient(to right, #0039A6 20%, #FF6319 20% 40%, #6CBE45 40% 60%, #EE352E 60% 80%, #FCCC0A 80% 100%) 1;
        }
        header h1 { 
            font-size: 3rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: -1.5px; 
            margin: 0; 
        }
        header p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-top: 10px;
        }

        /* Dynamic Navigation Menu */
        nav {
            margin-top: 25px;
        }
        nav a {
            color: white; 
            text-decoration: none; 
            font-size: 1.1rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 0 15px; 
            padding-bottom: 5px; 
            border-bottom: 3px solid transparent; /* Default to invisible border */
            transition: border-color 0.2s ease;
        }
        nav a:hover {
            color: #FF6319;
        }
        /* The active class makes the orange line appear! */
        nav a.active {
            border-bottom: 3px solid #FF6319;
        }
        
        /* The Content Wrapper */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white; 
            padding: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Transcontinental</h1>
        <p>Pacific to Atlantic &nbsp;&bull;&nbsp; Summer 2026</p>
        
        <nav>
            <a href="{{ site.baseurl }}/" class="{% if page.url == '/' or page.url == '/index.html' %}active{% endif %}">Journal</a>
            <a href="{{ site.baseurl }}/tracker.html" class="{% if page.url == '/tracker.html' %}active{% endif %}">Live Map</a>
        </nav>
    </header>

    <div class="container">
        {{ content }}
    </div>

</body>
</html>
