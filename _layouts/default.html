<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Transcontinental</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* NYC Subway Tile Background */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa;
            background-image:
              linear-gradient(to right, #e9ecef 1px, transparent 1px),
              linear-gradient(to bottom, #e9ecef 1px, transparent 1px);
            background-size: 60px 30px; 
            color: #121212;
        }

        /* Bold MTA-Style Sticky Header */
        header {
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background-color: #121212;
            color: white;
            text-align: center;
        }
        
        .header-text {
            padding: 25px 20px 20px 20px;
        }

        header h1 { 
            font-size: 3rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: -1.5px; 
            margin: 0; 
        }
        header p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-top: 10px;
            margin-bottom: 0;
        }

        /* --------------------------------------
           THE ANIMATED 5-COLOR ACCORDION TABS 
           -------------------------------------- */
        .mta-tabs {
            display: flex;
            width: 100%;
            height: 40px; /* Slightly taller to accommodate the icons comfortably */
        }
        
        .mta-tab {
            flex: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden; 
            cursor: pointer;
            transition: flex 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ICON CSS */
        .tab-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            object-fit: contain;
        }

        /* CSS Magic: Turns black icons white for dark tabs! */
        .tab-blue .tab-icon,
        .tab-orange .tab-icon,
        .tab-green .tab-icon,
        .tab-red .tab-icon {
            filter: invert(1); 
        }
        /* Yellow tab text/icon stays black for contrast */
        .tab-yellow { color: #121212; }

        /* TEXT ANIMATION CSS */
        .mta-tab span {
            opacity: 0;
            max-width: 0;
            white-space: nowrap;
            transition: all 0.4s ease;
            display: inline-block;
        }

        .mta-tab:hover, 
        .mta-tab.active {
            flex: 4; 
        }

        /* Fades text in and adds a margin to separate it from the icon */
        .mta-tab:hover span, 
        .mta-tab.active span {
            opacity: 1;
            max-width: 150px; 
            margin-left: 8px; 
        }

        /* Assigning the 5 exact MTA Route Colors */
        .tab-blue   { background-color: #0039A6; }
        .tab-orange { background-color: #FF6319; }
        .tab-green  { background-color: #6CBE45; }
        .tab-red    { background-color: #EE352E; }
        .tab-yellow { background-color: #FCCC0A; } 

        /* The Content Wrapper */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white; 
            padding: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-text">
            <h1>The Transcontinental</h1>
            <p>Pacific to Atlantic &nbsp;&bull;&nbsp; Summer 2026</p>
        </div>
        
        <nav class="mta-tabs">
            <a href="{{ site.baseurl }}/" class="mta-tab tab-blue {% if page.url == '/' or page.url == '/index.html' %}active{% endif %}">
                <img src="{{ site.baseurl }}/images/journal.png" class="tab-icon" alt="Journal">
                <span>Journal</span>
            </a>
            
            <a href="{{ site.baseurl }}/tracker.html" class="mta-tab tab-orange {% if page.url contains 'tracker' %}active{% endif %}">
                <img src="{{ site.baseurl }}/images/live-map.png" class="tab-icon" alt="Live Map">
                <span>Live Map</span>
            </a>
            
            <a href="{{ site.baseurl }}/photos.html" class="mta-tab tab-green {% if page.url contains 'photos' %}active{% endif %}">
                <img src="{{ site.baseurl }}/images/photos.png" class="tab-icon" alt="Photos">
                <span>Photos</span>
            </a>
            
            <a href="{{ site.baseurl }}/board.html" class="mta-tab tab-red {% if page.url contains 'board' %}active{% endif %}">
                <img src="{{ site.baseurl }}/images/message-board.png" class="tab-icon" alt="Message Board">
                <span>Message Board</span>
            </a>
            
            <a href="{{ site.baseurl }}/stats.html" class="mta-tab tab-yellow {% if page.url contains 'stats' %}active{% endif %}">
                <img src="{{ site.baseurl }}/images/stats.png" class="tab-icon" alt="Stats">
                <span>Stats</span>
            </a>
        </nav>
    </header>

    <div class="container">
        {{ content }}
    </div>

</body>
</html>
