<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Transcontinental</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* NYC Subway Tile Background */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa;
            background-image:
              linear-gradient(to right, #e9ecef 1px, transparent 1px),
              linear-gradient(to bottom, #e9ecef 1px, transparent 1px);
            background-size: 60px 30px; /* Creates the rectangular tile pattern */
            color: #121212;
        }

        /* Bold MTA-Style Header */
        header {
            background-color: #121212;
            color: white;
            padding: 40px 20px;
            text-align: center;
            /* The 5-Color Subway Route Accent Line */
            border-bottom: 6px solid;
            border-image: linear-gradient(to right, #0039A6 20%, #FF6319 20% 40%, #6CBE45 40% 60%, #EE352E 60% 80%, #FCCC0A 80% 100%) 1;
        }
        header h1 { 
            font-size: 3rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: -1.5px; 
            margin: 0; 
        }
        header p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-top: 10px;
        }

        /* The Content Wrapper */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white; /* Keeps the map and posts clean against the tile background */
            padding: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            min-height: 100vh;
        }

        /* Styles for the Markdown Posts */
        .journal-feed { padding: 40px; }
        .post {
            border-left: 5px solid #121212; /* Acts as the "subway line" connecting posts */
            padding-left: 25px;
            margin-bottom: 60px;
            position: relative;
        }
        /* The "Subway Stop" Circle */
        .post::before {
            content: '';
            position: absolute;
            left: -14px;
            top: 0;
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            border: 5px solid #121212;
        }
        .post-meta {
            font-weight: bold;
            color: #FF6319; /* MTA Orange */
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        .post h2 {
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            font-weight: bold;
            letter-spacing: -0.5px;
        }
        .post img { max-width: 100%; height: auto; border: 1px solid #ccc; margin: 15px 0; }
        .post p { font-size: 1.15rem; line-height: 1.6; color: #333; }
    </style>
</head>
<body>

    <header>
        <h1>The Transcontinental</h1>
        <p>Pacific to Atlantic &nbsp;&bull;&nbsp; Summer 2026</p>
    </header>

    <div class="container">
        {{ content }}
    </div>

</body>
</html>
