layout: default
title: Live Tracker
---

<style>
    /* 1. Completely disable scrolling on this specific page */
    body, html {
        overflow: hidden !important; 
        background-color: #e5e5e5;
    }
    
    /* 2. Break out of the 800px width limit so it touches the edges of the screen */
    .container {
        max-width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
    }

    /* 3. Force the map to fill the screen minus the exact height of your header */
    #map {
        width: 100%;
        height: calc(100vh - 175px) !important; 
        background-color: #e5e5e5;
        border: none !important;
    }
    
    .leaflet-control-container {
        margin-bottom: 20px;
    }
</style>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
    var map = L.map('map', { preferCanvas: true }).setView([39.8283, -98.5795], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // We updated these paths to look inside the new 'gpx' folder!
    var myRoutes = [
        'gpx/TA_01_EB_Main_2022.gpx', 'gpx/TA_02_EB_Main_2018.gpx', 'gpx/TA_03_EB_Main_2022.gpx',
        'gpx/TA_04_EB_Main_2020.gpx', 'gpx/TA_05_EB_Main_2018.gpx', 'gpx/TA_06_EB_Main_2018.gpx',
        'gpx/TA_07_EB_Main_2019.gpx', 'gpx/TA_08_EB_Main_2019.gpx', 'gpx/TA_09_EB_Main_2020.gpx',
        'gpx/R66_01_EB_Main_2020.gpx', 'gpx/Great_Lake-to-Lake_Trails_Route__1.gpx',
        'gpx/Hudson_Valley_EST.gpx', 'gpx/Erie_Canal_EST_Buffalo-Albany.gpx'
    ];

    myRoutes.forEach(function(routeFile) {
        new L.GPX(routeFile, {
            async: true,
            marker_options: { startIconUrl: '', endIconUrl: '', shadowUrl: '' },
            polyline_options: { color: '#0039A6', weight: 5, opacity: 0.8 }
        }).addTo(map); 
    });

    fetch('strava_rides.geojson')
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                style: function (feature) {
                    return { color: '#FF6319', weight: 5, opacity: 1.0 };
                },
                onEachFeature: function (feature, layer) {
                    var distMiles = (feature.properties.distance * 0.000621371).toFixed(1);
                    layer.bindPopup("<b>" + feature.properties.name + "</b><br>" + distMiles + " miles");
                }
            }).addTo(map);
        })
        .catch(err => console.log("No Strava data found yet."));
</script>
