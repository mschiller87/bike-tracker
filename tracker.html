---
layout: default
title: Live Tracker
---

<style>
    body, html {
        overflow: hidden !important; 
        background-color: #e5e5e5;
    }
    
    .container {
        max-width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
    }

    .map-wrapper {
        position: relative;
        width: 100%;
        height: calc(100vh - 175px) !important; 
    }

    #map {
        width: 100%;
        height: 100%;
        background-color: #e5e5e5;
        border: none !important;
    }
    
    /* The Smart Strava Button */
    .strava-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 1000; 
        background-color: #FC4C02; 
        color: white;
        text-decoration: none;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-weight: bold;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 10px 15px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: all 0.2s ease;
    }

    .strava-btn:hover {
        background-color: #e34402;
        transform: scale(1.05);
    }

    .strava-btn svg {
        width: 20px;
        height: 20px;
        fill: white;
    }

    .leaflet-control-container {
        margin-bottom: 20px;
    }

    /* --- MOBILE MAP FIXES --- */
    @media (max-width: 600px) {
        .map-wrapper {
            height: calc(100vh - 120px) !important; /* Adjusts map height to match the new slimmer mobile header */
        }
        /* Hides the text and turns the button into a pure circle icon! */
        .strava-text { display: none; }
        .strava-btn { 
            padding: 10px; 
            border-radius: 50%; /* Makes it a circle */
            top: 15px; 
            right: 15px;
        }
    }
</style>

<div class="map-wrapper">
    
    <a href="https://www.strava.com/athletes/58448912" target="_blank" class="strava-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.387 17.944l-2.089 4.116h-3.065L15.387 12l5.15 10.06h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/>
        </svg>
        <span class="strava-text">Follow on Strava</span>
    </a>

    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
    var map = L.map('map', { preferCanvas: true }).setView([39.8283, -98.5795], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    var myRoutes = [
        'gpx/TA_01_EB_Main_2022.gpx', 'gpx/TA_02_EB_Main_2018.gpx', 'gpx/TA_03_EB_Main_2022.gpx',
        'gpx/TA_04_EB_Main_2020.gpx', 'gpx/TA_05_EB_Main_2018.gpx', 'gpx/TA_06_EB_Main_2018.gpx',
        'gpx/TA_07_EB_Main_2019.gpx', 'gpx/TA_08_EB_Main_2019.gpx', 'gpx/TA_09_EB_Main_2020.gpx',
        'gpx/R66_01_EB_Main_2020.gpx', 'gpx/Great_Lake-to-Lake_Trails_Route__1.gpx',
        'gpx/Hudson_Valley_EST.gpx', 'gpx/Erie_Canal_EST_Buffalo-Albany.gpx'
    ];

    myRoutes.forEach(function(routeFile) {
        new L.GPX(routeFile, {
            async: true,
            marker_options: { startIconUrl: '', endIconUrl: '', shadowUrl: '' },
            polyline_options: { color: '#0039A6', weight: 5, opacity: 0.8 }
        }).addTo(map); 
    });

    fetch('strava_rides.geojson')
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                style: function (feature) {
                    return { color: '#FF6319', weight: 5, opacity: 1.0 };
                },
                onEachFeature: function (feature, layer) {
                    var distMiles = (feature.properties.distance * 0.000621371).toFixed(1);
                    layer.bindPopup("<b>" + feature.properties.name + "</b><br>" + distMiles + " miles");
                }
            }).addTo(map);
        })
        .catch(err => console.log("No Strava data found yet."));
</script>
